name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # CI 里 postgres 在 5432(无本机冲突)
      DATABASE_URL: postgresql+psycopg://agora_app:agora_app@localhost:5432/agora
      DATABASE_ADMIN_URL: postgresql+psycopg://agora:agora@localhost:5432/agora
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build (含 tsc 类型检查)
        working-directory: frontend
        run: pnpm build
