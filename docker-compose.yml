# 阶段 0 暂不需要这些(纯流式对话不连库)。
# 阶段 2 起(记忆/RAG)用 postgres+pgvector;阶段 3 起用 redis。
# 现在可以先 `docker compose up -d` 让它们跑着,后端代码到阶段 2 再接。
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
